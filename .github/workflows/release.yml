name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Build universal binary
        run: |
          swift build -c release --arch arm64 --arch x86_64
          cp .build/apple/Products/Release/ClaudeMosaic .
          chmod +x ClaudeMosaic
          file ClaudeMosaic

      - name: Build .app bundle
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          APP="ClaudeMosaic.app"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          cp ClaudeMosaic "$APP/Contents/MacOS/"
          cp Sources/ClaudeMosaic/Resources/AppIcon.icns "$APP/Contents/Resources/"

          cat > "$APP/Contents/Info.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleIdentifier</key>
              <string>com.claude.mosaic</string>
              <key>CFBundleName</key>
              <string>Claude Mosaic</string>
              <key>CFBundleExecutable</key>
              <string>ClaudeMosaic</string>
              <key>CFBundleIconFile</key>
              <string>AppIcon</string>
              <key>CFBundleVersion</key>
              <string>$VERSION</string>
              <key>CFBundleShortVersionString</key>
              <string>$VERSION</string>
              <key>LSUIElement</key>
              <true/>
          </dict>
          </plist>
          EOF

          codesign --force --deep -s - "$APP"

      - name: Build .dmg
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DMG_NAME="ClaudeMosaic-${VERSION}.dmg"
          STAGING="dmg-staging"

          mkdir -p "$STAGING"
          cp -R ClaudeMosaic.app "$STAGING/"
          ln -s /Applications "$STAGING/Applications"

          hdiutil create -volname "Claude Mosaic" \
            -srcfolder "$STAGING" \
            -ov -format UDZO \
            "$DMG_NAME"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ClaudeMosaic-[0-9]*.dmg
