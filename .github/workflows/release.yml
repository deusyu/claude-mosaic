name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: macos-13
            arch: x86_64
          - runner: macos-14
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: swift build -c release

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.arch }}
          path: .build/release/ClaudeMosaic

  release:
    needs: build
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create universal binary and app bundle
        run: |
          # Universal binary
          lipo -create \
            artifacts/binary-arm64/ClaudeMosaic \
            artifacts/binary-x86_64/ClaudeMosaic \
            -output ClaudeMosaic
          chmod +x ClaudeMosaic

          # App bundle
          APP="ClaudeMosaic.app"
          mkdir -p "$APP/Contents/MacOS"
          cp ClaudeMosaic "$APP/Contents/MacOS/"

          cat > "$APP/Contents/Info.plist" << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleIdentifier</key>
              <string>com.claude.mosaic</string>
              <key>CFBundleName</key>
              <string>Claude Mosaic</string>
              <key>CFBundleExecutable</key>
              <string>ClaudeMosaic</string>
              <key>CFBundleVersion</key>
              <string>${GITHUB_REF_NAME#v}</string>
              <key>CFBundleShortVersionString</key>
              <string>${GITHUB_REF_NAME#v}</string>
              <key>LSUIElement</key>
              <true/>
          </dict>
          </plist>
          EOF

          # Ad-hoc codesign
          codesign --force --deep -s - "$APP"

          # Zip
          zip -r ClaudeMosaic.zip "$APP" install.sh uninstall.sh

          # Also zip standalone binary for CLI users
          zip ClaudeMosaic-cli.zip ClaudeMosaic

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ClaudeMosaic.zip
            ClaudeMosaic-cli.zip
